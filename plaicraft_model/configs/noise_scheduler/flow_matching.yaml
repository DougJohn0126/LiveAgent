# Flow Matching Scheduler
# Simple straight interpolation: x_t = (1 - t) * x_0 + t * eps
# All fields below are Hydra-configurable and map directly to FlowMatchingScheduler.__init__

_target_: src.training.noise_schedulers.FlowMatchingScheduler
target_modalities: ${model.target_modalities}

# Timestep sampling distribution: uniform | logitnormal
sampling_type: "logitnormal"

# Logit-normal hyperparameters (only used when sampling_type = logitnormal)
p_mean: -1.2   # Mean of the logit-normal distribution
p_std: 1.2     # Std  of the logit-normal distribution

# Dimension-aware time shift (Esser et al. 2024)
use_time_shift: false   # Enable/disable the shift: t_m = (alpha*t) / (1 + (alpha-1)*t)
base_dim: 4096          # Reference dimensionality n; alpha = m / base_dim
