# @package _global_

# example hyperparameter optimization for Plai v1 model with Optuna:
# python src/train.py -m hparams_search=plai_v1_optuna experiment=plai_v1_example

defaults: # Override Hydra sweeper
  - override /hydra/sweeper: optuna # Use Optuna sweeper

# choose metric which will be optimized by Optuna
# make sure this is the correct name of some metric logged in lightning module!
optimized_metric: "val/total_loss" # Metric Optuna will optimize

# here we define Optuna hyperparameter search
# it optimizes for value returned from function with @hydra.main decorator
# docs: https://hydra.cc/docs/next/plugins/optuna_sweeper
hydra: # Hydra sweeper configuration
  mode: "MULTIRUN" # Enable multirun by default

  sweeper: # Optuna sweeper settings
    _target_: hydra_plugins.hydra_optuna_sweeper.optuna_sweeper.OptunaSweeper # Sweeper class

    # storage URL to persist optimization results
    # for example, you can use SQLite if you set 'sqlite:///example.db'
    storage: null # Storage URL for study persistence

    # name of the study to persist optimization results
    study_name: null # Study name for persistence

    # number of parallel workers
    n_jobs: 1 # Parallel worker count

    # 'minimize' or 'maximize' the objective
    direction: minimize # Optimization direction

    # total number of runs that will be executed
    n_trials: 50 # Total number of trials

    # choose Optuna hyperparameter sampler
    # you can choose bayesian sampler (tpe), random search (without optimization), grid sampler, and others
    # docs: https://optuna.readthedocs.io/en/stable/reference/samplers.html
    sampler: # Sampler configuration
      _target_: optuna.samplers.TPESampler # Sampler class
      seed: 42 # RNG seed
      n_startup_trials: 10 # Random trials before optimization

    # define hyperparameter search space
    params: # Hyperparameter search space
      module.learning_rate: interval(0.00005, 0.001) # Learning rate range
      module.weight_decay: interval(0.0, 0.1) # Weight decay range
      module.lr_scheduler: choice(cosine_warmup, linear_warmup, poly) # Scheduler choice
      module.lr_warmup_steps: choice(5000, 10000, 20000) # Warmup steps
      model.h_dim: choice(512, 768, 1024) # Hidden dimension options
      model.num_heads: choice(8, 12, 16) # Attention heads
      model.num_layers: choice(6, 8, 12) # Layer count
      model.dropout: interval(0.0, 0.3) # Dropout range
      data.batch_size: choice(32, 64, 128) # Batch size options
