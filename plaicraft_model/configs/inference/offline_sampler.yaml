_target_: src.inference.offline_sampler.PlaiV1Sampler

target_modalities: ${model.target_modalities}

# Sampling range over dataloader batches
start_index: 0
stop_index: 1
index_hop: 1 # dataloader index stride from start_index (e.g., start=0, hop=2 -> 0,2,4,...)
num_samples: null # if set, number of selected samples after hop filtering; overrides stop_index
generation_length: null # number of retained dataframes to generate after warmup
warmup_length: 10 # number of initial GT dataframes used to warm up context before generation
include_warmup_length: null # number of warmup dataframes kept in final outputs; null keeps all warmup
chunk_length: 2 # max number of dataframes generated per autoregressive step
warmup_ltm_chunk_length: 100 # LTM warmup processing chunk size (in dataframes); must be divisible by model.ltm_downsample_chunk_length
sampling_mode: "autoregressive" # autoregressive | teacher_forcing

# Denoising sampler
denoising_type: "flow"  # flow
flow_matching_sampler: "euler"  # euler | heun
num_denoising_steps: 50

# Decode/output control
decode: true
make_audio_plots: true
store_decoded_generated: false
store_decoded_gt: false
