_target_: lightning.Trainer # Trainer class

# Training configuration
default_root_dir: ${paths.output_dir} # Root directory for outputs

# Number of training epochs
min_epochs: 1  # prevents early stopping
max_epochs: -1  # Infinite epochs (use max_steps instead)
max_steps: -1 # Total training steps

# Accelerator
accelerator: gpu # GPU accelerator
devices: 1 # GPU count
num_nodes: 1 # Node count

# Strategy (ddp, deepspeed_stage_2, deepspeed_stage_3)
strategy: ddp_find_unused_parameters_true # Distributed training strategy

# Mixed precision
precision: bf16-mixed # Mixed precision mode

# Gradient settings
gradient_clip_val: 1.0 # Gradient clipping value
gradient_clip_algorithm: norm # Clipping algorithm
accumulate_grad_batches: 1 # Gradient accumulation steps

# Logging and checkpointing
log_every_n_steps: 100 # Logging frequency (steps)
val_check_interval: 10000  # Validate every N steps
check_val_every_n_epoch: null # Disable epoch-based validation

# Validation/test batches
limit_val_batches: 1.0 # Fraction of validation batches
limit_train_batches: 1.0 # Fraction of training batches
limit_test_batches: 1.0 # Fraction of test batches

# Sanity checks
num_sanity_val_steps: 0 # Sanity validation steps

# Debugging
overfit_batches: 0.0  # Set to >0 for debugging
fast_dev_run: false # Fast dev run toggle

# Model summary
enable_model_summary: true # Show model summary

# Distributed training
use_distributed_sampler: true  # Custom sampler handling

# Progress bar
enable_progress_bar: true # Enable progress bar

# Deterministic mode (slower but reproducible)
deterministic: false # Deterministic training behavior
