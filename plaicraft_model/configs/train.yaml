# @package _global_

# specify here default configuration
# order of defaults determines the order in which configs override each other
defaults: # Base config composition order
  - _self_ # Keep local defaults
  - data: train # DataModule config
  - noise_scheduler: flow_matching  # Generative scheduler (diffusion, consistency, edm)
  - model: plai_v1 # Model architecture config
  - module: plai_v1 # LightningModule config
  - callbacks: default # Callback presets
  - logger: wandb # Logger backend
  - trainer: ddp # Trainer defaults
  - paths: default # Path presets
  - extras: default # Extra runtime behaviors
  - hydra: default # Hydra runtime settings

  # experiment configs allow for version control of specific hyperparameters
  # e.g. best hyperparameters for given model and datamodule
  - experiment: null # Optional experiment overrides

  # config for hyperparameter optimization
  - hparams_search: null # Optional hyperparameter search config

  # optional local config for machine/user specific settings
  # it's optional since it doesn't need to exist and is excluded from version control
  - optional local: default # Optional machine-specific overrides

  # debugging config (enable through command line, e.g. `python train.py debug=default)
  - debug: null # Optional debug presets

# task name, determines output directory path
task_name: "train" # Run name used in output paths

# tags to help you identify your experiments
# overwrite from command line with `python train.py tags="[first_tag, second_tag]"`
tags: ["plaicraft", "plai_v1"] # Experiment tags for tracking

# set False to skip model training
train: True # Enable training loop

# evaluate on test set, using best model weights achieved during training
# lightning chooses best weights based on the metric specified in checkpoint callback
test: False # Run test after training

# simply provide checkpoint path to resume training
ckpt_path: null # Checkpoint path to resume training
wandb_artifact_path: null # W&B artifact path to resume training

# seed for random number generators in pytorch, numpy and python.random
seed: 42 # RNG seed

# DeepSpeed specific flags
ds_universal: false  # Load universal checkpoint format
ds_offload: false  # Offload optimizer to CPU

# TorchDynamo runtime settings
torch_dynamo:
  optimize_ddp: false

# Optimized metric for hyperparameter search
optimized_metric: null # Metric optimized during hyperparameter search
