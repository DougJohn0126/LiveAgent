_target_: src.data.datamodule.DataModule # DataModule class

# Dataset parameters
dataset_path: ${oc.env:DATASET_PATH} # Dataset root path
training_metadata_db_path: ${paths.training_metadata_db_path} # Training metadata database
evaluation_metadata_db_path: ${paths.evaluation_metadata_db_path} # Evaluation metadata database

# Modalities to use
modalities: # Modalities to load and return from the datamodule
  - video
  - audio_hear
  - audio_speak
  - key_press
  - mouse_movement

# Window parameters (in units, where 1 = 200ms = 2 video frames)
# All length belows refers to number of dataframes
window_length_frames: 100 # Number of dataframes in each window
hop_length_frames: 5 # Number of dataframes to hop between windows

# Player filtering
player_names: null

# Data loading
batch_size: 2 # Number of windows in one Mega-Read batch
num_workers: 8 # DataLoader worker count
shuffle: false # Shuffle training data
target_length: 2 # Target sequence length in dataframes
k_subsample_size: 10 # Number of (target, context) sub-batches unrolled per Mega-Read window
stm_context_length: ${model.stm_context_length} # Minimum valid context length (must match model STM length)
