_target_: src.data.datamodule.DataModule # DataModule class

# Dataset parameters
dataset_path: ${oc.env:DATASET_PATH} # Dataset root path
training_metadata_db_path: ${paths.training_metadata_db_path} # Training metadata database
evaluation_metadata_db_path: ${paths.evaluation_metadata_db_path} # Evaluation metadata database

# Modalities to use
modalities: # Modalities to include
  - video
  - audio_hear
  - audio_speak
  - key_press
  - mouse_movement

# Window parameters (in units, where 1 = 200ms = 2 video frames)
# All length belows refers to number of dataframes
window_length_frames: 110 # Number of dataframes in each window
hop_length_frames: 100 # Number of dataframes to hop between windows

# Player filtering
player_names: null

# Data loading
batch_size: 1 # Batch size for loaders
num_workers: 2 # DataLoader worker count
shuffle: false # Shuffle data order
